<!DOCTYPE html>
<!-- SPDX-License-Identifier: GPL-3.0-or-later -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Packets</title>

<style>
  body {
    margin: 0;
    background: #808080;
    font-family: 'Ubuntu Mono', 'Courier New', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  #panel {
    width: 95vw;
    height: 90vh;
    background: #fff;
    border-radius: 6px;
    padding: 15px 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  #controls button {
    font-family: inherit;
    font-size: 14px;
    padding: 6px 12px;
    border: 1px solid #aaa;
    border-radius: 3px;
    background: #f0f0f0;
    cursor: pointer;
  }
  #controls button:hover {
    background: #ddd;
  }
  #controls button.active {
    background: #2a7ae2;
    color: #fff;
    border-color: #2a7ae2;
  }
  #controls .separator {
    width: 1px;
    height: 24px;
    background: #ccc;
    margin: 0 4px;
  }
  #status {
    font-size: 13px;
    color: #555;
    margin-left: auto;
  }
  #status.full {
    color: #c00;
    font-weight: bold;
  }

  /* Split pane: packet list on top, detail on bottom */
  #list-pane {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
  }
  #detail-pane {
    flex: 1;
    min-height: 0;
    border-top: 2px solid #ccc;
    overflow-y: auto;
    padding: 10px 5px;
    font-size: 13px;
    color: #333;
  }
  #detail-pane.empty {
    color: #999;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    position: sticky;
    top: 0;
    background: #f5f5f5;
    border-bottom: 2px solid #ccc;
    text-align: left;
    padding: 4px 8px;
    white-space: nowrap;
  }
  tbody td {
    padding: 3px 8px;
    border-bottom: 1px solid #eee;
    white-space: nowrap;
  }
  tbody tr {
    cursor: pointer;
  }
  tbody tr:hover {
    background: #f0f5ff !important;
  }
  tbody tr.entered {
    background: #e8f5e9;
  }
  tbody tr.delivered {
    background: #e3f2fd;
  }
  tbody tr.rst {
    background: #ffebee;
    color: #c00;
  }
  tbody tr.selected {
    outline: 2px solid #2a7ae2;
  }

  /* Detail tree */
  .detail-section {
    margin-bottom: 4px;
  }
  .detail-header {
    cursor: pointer;
    font-weight: bold;
    padding: 3px 0;
    user-select: none;
  }
  .detail-header:hover {
    color: #2a7ae2;
  }
  .detail-header::before {
    content: "\25b6 ";
    font-size: 10px;
    display: inline-block;
    width: 14px;
  }
  .detail-header.open::before {
    content: "\25bc ";
  }
  .detail-body {
    display: none;
    padding-left: 20px;
  }
  .detail-body.open {
    display: block;
  }
  .detail-row {
    padding: 1px 0;
  }
  .detail-label {
    color: #555;
  }
</style>

</head>
<body>
<div id="panel">
  <div id="controls">
    <button class="active" data-addr="">All</button>
    <button data-addr="130.192.91.211">Client</button>
    <button data-addr="104.18.26.120">Server</button>
    <button data-addr="130.192.3.21">DNS polito</button>
    <button data-addr="8.8.8.8">DNS google</button>
    <div class="separator"></div>
    <button id="btn-refresh">Refresh</button>
    <button id="btn-clear">Clear</button>
    <span id="status"></span>
  </div>
  <div id="list-pane">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Time</th>
          <th>Event</th>
          <th>Source</th>
          <th>Destination</th>
          <th>Protocol</th>
          <th>Length</th>
          <th>Info</th>
        </tr>
      </thead>
      <tbody id="packets"></tbody>
    </table>
  </div>
  <div id="detail-pane" class="empty">Click a packet to see details.</div>
</div>

<script>
"use strict";

let currentAddr = "";
let allPackets = [];
let selectedRow = null;

// Perspective buttons.
const perspectiveButtons = document.querySelectorAll("#controls button[data-addr]");
for (const btn of perspectiveButtons) {
  btn.addEventListener("click", () => {
    currentAddr = btn.dataset.addr;
    for (const b of perspectiveButtons) {
      b.classList.toggle("active", b === btn);
    }
    refresh();
  });
}

document.getElementById("btn-refresh").addEventListener("click", refresh);

document.getElementById("btn-clear").addEventListener("click", async () => {
  await fetch("/api/pktlog", { method: "DELETE" });
  refresh();
});

async function refresh() {
  let url = "/api/pktlog?format=json";
  if (currentAddr) {
    url += "&addr=" + encodeURIComponent(currentAddr);
  }

  const resp = await fetch(url);
  if (!resp.ok) {
    document.getElementById("status").textContent = "Error: " + resp.statusText;
    return;
  }

  const data = await resp.json();
  allPackets = data.packets || [];

  // Update status.
  const statusEl = document.getElementById("status");
  statusEl.textContent = data.count + " / " + data.capacity + " packets";
  statusEl.classList.toggle("full", data.count >= data.capacity);

  // Clear detail pane.
  const detailPane = document.getElementById("detail-pane");
  detailPane.className = "empty";
  detailPane.textContent = "Click a packet to see details.";
  selectedRow = null;

  // Update table.
  const tbody = document.getElementById("packets");
  tbody.innerHTML = "";

  if (allPackets.length === 0) {
    const tr = document.createElement("tr");
    const td = document.createElement("td");
    td.colSpan = 8;
    td.style.textAlign = "center";
    td.style.color = "#999";
    td.style.padding = "20px";
    td.textContent = "No packets captured.";
    tr.appendChild(td);
    tbody.appendChild(tr);
    return;
  }

  for (let i = 0; i < allPackets.length; i++) {
    const pkt = allPackets[i];
    const tr = document.createElement("tr");

    // Color by event, RST overrides.
    if (pkt.flags && pkt.flags.includes("RST")) {
      tr.className = "rst";
    } else {
      tr.className = pkt.event;
    }

    const cells = [
      pkt.number, pkt.time, pkt.event, pkt.src,
      pkt.dst, pkt.protocol, pkt.length, pkt.info,
    ];
    for (const value of cells) {
      const td = document.createElement("td");
      td.textContent = value;
      tr.appendChild(td);
    }

    tr.addEventListener("click", () => {
      if (selectedRow) selectedRow.classList.remove("selected");
      tr.classList.add("selected");
      selectedRow = tr;
      showDetail(pkt);
    });

    tbody.appendChild(tr);
  }
}

function showDetail(pkt) {
  const pane = document.getElementById("detail-pane");
  pane.className = "";
  pane.innerHTML = "";

  // IP section.
  if (pkt.detail && pkt.detail.ip) {
    const ip = pkt.detail.ip;
    pane.appendChild(makeSection(
      "Internet Protocol Version " + ip.version +
      ", Src: " + ip.src + ", Dst: " + ip.dst,
      [
        ["Version", ip.version],
        ["Header Length", ip.ihl * 4 + " bytes (" + ip.ihl + ")"],
        ["Type of Service", "0x" + ip.tos.toString(16).padStart(2, "0")],
        ["Total Length", ip.total_length],
        ["Identification", "0x" + ip.id.toString(16).padStart(4, "0") + " (" + ip.id + ")"],
        ["Don't Fragment", ip.flag_df ? "Set" : "Not set"],
        ["More Fragments", ip.flag_mf ? "Set" : "Not set"],
        ["Fragment Offset", ip.frag_offset],
        ["Time to Live", ip.ttl],
        ["Protocol", protocolName(ip.protocol) + " (" + ip.protocol + ")"],
        ["Header Checksum", "0x" + ip.checksum.toString(16).padStart(4, "0")],
        ["Source Address", ip.src],
        ["Destination Address", ip.dst],
      ]
    ));
  }

  // TCP section.
  if (pkt.detail && pkt.detail.tcp) {
    const tcp = pkt.detail.tcp;
    const flags = [];
    if (tcp.flag_syn) flags.push("SYN");
    if (tcp.flag_ack) flags.push("ACK");
    if (tcp.flag_fin) flags.push("FIN");
    if (tcp.flag_rst) flags.push("RST");
    if (tcp.flag_psh) flags.push("PSH");
    if (tcp.flag_urg) flags.push("URG");
    pane.appendChild(makeSection(
      "Transmission Control Protocol, Src Port: " + tcp.src_port +
      ", Dst Port: " + tcp.dst_port,
      [
        ["Source Port", tcp.src_port],
        ["Destination Port", tcp.dst_port],
        ["Sequence Number", tcp.seq],
        ["Acknowledgment Number", tcp.ack],
        ["Data Offset", tcp.data_offset * 4 + " bytes (" + tcp.data_offset + ")"],
        ["Flags", flags.join(", ") || "(none)"],
        ["Window", tcp.window],
        ["Checksum", "0x" + tcp.checksum.toString(16).padStart(4, "0")],
        ["Urgent Pointer", tcp.urgent],
        ["Payload Length", tcp.payload_length],
      ]
    ));
  }

  // UDP section.
  if (pkt.detail && pkt.detail.udp) {
    const udp = pkt.detail.udp;
    pane.appendChild(makeSection(
      "User Datagram Protocol, Src Port: " + udp.src_port +
      ", Dst Port: " + udp.dst_port,
      [
        ["Source Port", udp.src_port],
        ["Destination Port", udp.dst_port],
        ["Length", udp.length],
        ["Checksum", "0x" + udp.checksum.toString(16).padStart(4, "0")],
        ["Payload Length", udp.payload_length],
      ]
    ));
  }
}

function makeSection(title, rows) {
  const section = document.createElement("div");
  section.className = "detail-section";

  const header = document.createElement("div");
  header.className = "detail-header";
  header.textContent = title;

  const body = document.createElement("div");
  body.className = "detail-body";

  for (const [label, value] of rows) {
    const row = document.createElement("div");
    row.className = "detail-row";
    row.innerHTML = '<span class="detail-label">' + escapeHTML(label) +
      ':</span> ' + escapeHTML(String(value));
    body.appendChild(row);
  }

  header.addEventListener("click", () => {
    header.classList.toggle("open");
    body.classList.toggle("open");
  });

  section.appendChild(header);
  section.appendChild(body);
  return section;
}

function protocolName(num) {
  switch (num) {
    case 6: return "TCP";
    case 17: return "UDP";
    default: return "Unknown";
  }
}

function escapeHTML(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// Initial load.
refresh();
</script>

</body>
</html>
